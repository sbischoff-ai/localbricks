services:
  notebook:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      UC_URI: http://uc-server:8080
      UC_API_URL: http://uc-server:8080/api/2.1/unity-catalog
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-localbricks}
      SPARK_LOCAL_IP: 127.0.0.1
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/workspace/notebooks
      - ./data:/workspace/data
      - ./warehouse:/workspace/warehouse
      - spark_ivy_cache:/home/notebook/.ivy2
    depends_on:
      - uc-server

  uc-server:
    image: unitycatalog/unitycatalog:latest
    ports:
      - "8080:8080"
    volumes:
      - uc_data:/opt/unitycatalog/etc/data
      - ./warehouse:/workspace/warehouse

volumes:
  spark_ivy_cache:
  uc_data:
