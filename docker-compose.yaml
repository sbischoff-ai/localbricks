services:
  notebook:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      UC_URI: http://uc-server:8080
      UC_API_URL: http://uc-server:8080/api/2.1/unity-catalog
      UC_HOST_API_URL: http://localhost:8080/api/2.1/unity-catalog/catalogs
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.3-codex}
      JUPYTER_AI_ENABLED: ${JUPYTER_AI_ENABLED:-true}
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-localbricks}
      SPARK_LOCAL_IP: 127.0.0.1
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/workspace/notebooks
      - ./data:/workspace/data
      - ./warehouse:/workspace/warehouse
      - spark_ivy_cache:/home/notebook/.ivy2.5.2
    depends_on:
      - uc-server

  uc-server:
    image: unitycatalog/unitycatalog:v0.4.0
    ports:
      - "8080:8080"
    volumes:
      - uc_data:/opt/unitycatalog/etc/data
      - ./warehouse:/workspace/warehouse

volumes:
  spark_ivy_cache:
  uc_data:
