services:
  notebook:
    build:
      args:
        HTTP_PROXY: ${HTTP_PROXY:-${http_proxy:-}}
        HTTPS_PROXY: ${HTTPS_PROXY:-${https_proxy:-}}
        NO_PROXY: localhost,127.0.0.1,uc-server,${LOCALBRICKS_NO_PROXY_EXTRA:-}
        http_proxy: ${http_proxy:-${HTTP_PROXY:-}}
        https_proxy: ${https_proxy:-${HTTPS_PROXY:-}}
        no_proxy: localhost,127.0.0.1,uc-server,${LOCALBRICKS_NO_PROXY_EXTRA:-}
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-${http_proxy:-}}
      HTTPS_PROXY: ${HTTPS_PROXY:-${https_proxy:-}}
      NO_PROXY: localhost,127.0.0.1,uc-server,${LOCALBRICKS_NO_PROXY_EXTRA:-}
      LOCALBRICKS_NO_PROXY_EXTRA: ${LOCALBRICKS_NO_PROXY_EXTRA:-}
      http_proxy: ${http_proxy:-${HTTP_PROXY:-}}
      https_proxy: ${https_proxy:-${HTTPS_PROXY:-}}
      no_proxy: localhost,127.0.0.1,uc-server,${LOCALBRICKS_NO_PROXY_EXTRA:-}

  uc-server:
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-${http_proxy:-}}
      HTTPS_PROXY: ${HTTPS_PROXY:-${https_proxy:-}}
      NO_PROXY: localhost,127.0.0.1,uc-server,${LOCALBRICKS_NO_PROXY_EXTRA:-}
      LOCALBRICKS_NO_PROXY_EXTRA: ${LOCALBRICKS_NO_PROXY_EXTRA:-}
      http_proxy: ${http_proxy:-${HTTP_PROXY:-}}
      https_proxy: ${https_proxy:-${HTTPS_PROXY:-}}
      no_proxy: localhost,127.0.0.1,uc-server,${LOCALBRICKS_NO_PROXY_EXTRA:-}
